# ─── Baseline: What the customer already has ───────────────────────
# This represents the EXISTING gateway config before AP2 is added.
# It includes the LLM route and global OpenTelemetry plugin.
#
# Usage:
#   deck gateway sync --select-tag ap2-baseline \
#     --konnect-token $TOKEN --konnect-control-plane-name $CP \
#     config/baseline.yml
# ───────────────────────────────────────────────────────────────────
_format_version: "3.0"

services:
  - name: mistral-llm-svc
    url: https://api.mistral.ai
    tags: [ap2-baseline]
    routes:
      - name: mistral-llm-route
        paths:
          - /llm
        strip_path: true
        tags: [ap2-baseline]

plugins:
  - name: opentelemetry
    tags: [ap2-baseline]
    config:
      traces_endpoint: http://host.docker.internal:4318/v1/traces
      resource_attributes:
        service.name: kong-gateway
      sampling_rate: 1.0
