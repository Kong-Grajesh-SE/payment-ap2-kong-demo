_format_version: "3.0"

services:
  - name: orchestrator-svc
    url: http://host.docker.internal:8080
    routes:
      - name: orchestrator-route
        paths:
          - /api/v1
        strip_path: true

  - name: search-svc
    url: http://host.docker.internal:9001
    routes:
      - name: search-route
        paths:
          - /agents/search
        strip_path: true

  - name: cart-intent-svc
    url: http://host.docker.internal:9002
    routes:
      - name: cart-intent-route
        paths:
          - /agents/cart-intent
        strip_path: true

  - name: cart-mandate-svc
    url: http://host.docker.internal:9003
    routes:
      - name: cart-mandate-route
        paths:
          - /agents/cart-mandate
        strip_path: true

  - name: payment-svc
    url: http://host.docker.internal:9004
    routes:
      - name: payment-route
        paths:
          - /agents/payment
        strip_path: true

  # ─── LLM Gateway: Mistral via Kong ─────────────────────────────
  - name: mistral-llm-svc
    url: https://api.mistral.ai
    routes:
      - name: mistral-llm-route
        paths:
          - /llm
        strip_path: true

plugins:
  - name: opentelemetry
    config:
      traces_endpoint: http://host.docker.internal:4319/v1/traces
      resource_attributes:
        service.name: kong-ap2-gateway
      sampling_rate: 1.0

  - name: kong-did-interceptor
    service: search-svc
    config:
      did_registry_url: http://host.docker.internal:8070
      did_method: peer

  - name: kong-did-interceptor
    service: cart-intent-svc
    config:
      did_registry_url: http://host.docker.internal:8070
      did_method: peer

  - name: kong-did-interceptor
    service: cart-mandate-svc
    config:
      did_registry_url: http://host.docker.internal:8070
      did_method: peer

  - name: kong-did-interceptor
    service: payment-svc
    config:
      did_registry_url: http://host.docker.internal:8070
      did_method: peer

  - name: kong-did-verifier
    service: search-svc
    config:
      did_registry_url: http://host.docker.internal:8070

  - name: kong-did-verifier
    service: cart-intent-svc
    config:
      did_registry_url: http://host.docker.internal:8070

  - name: kong-did-verifier
    service: cart-mandate-svc
    config:
      did_registry_url: http://host.docker.internal:8070

  - name: kong-did-verifier
    service: payment-svc
    config:
      did_registry_url: http://host.docker.internal:8070

  - name: kong-worm-logger
    service: search-svc
    config:
      worm_storage_url: http://host.docker.internal:8090

  - name: kong-worm-logger
    service: cart-intent-svc
    config:
      worm_storage_url: http://host.docker.internal:8090

  - name: kong-worm-logger
    service: cart-mandate-svc
    config:
      worm_storage_url: http://host.docker.internal:8090

  - name: kong-worm-logger
    service: payment-svc
    config:
      worm_storage_url: http://host.docker.internal:8090

  - name: ai-a2a-proxy
    service: search-svc
    config:
      logging:
        log_statistics: true
        log_payloads: true

  - name: ai-a2a-proxy
    service: cart-intent-svc
    config:
      logging:
        log_statistics: true
        log_payloads: true

  - name: ai-a2a-proxy
    service: cart-mandate-svc
    config:
      logging:
        log_statistics: true
        log_payloads: true

  - name: ai-a2a-proxy
    service: payment-svc
    config:
      logging:
        log_statistics: true
        log_payloads: true
